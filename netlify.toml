[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' https: data:; connect-src 'self' https://*.polymarket.com https://polygon-rpc.com https://*.polygon-rpc.com https://polygon-bor-rpc.publicnode.com; base-uri 'none'; object-src 'none'; frame-ancestors 'none'; form-action 'none'"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888
  publish = "dist"
